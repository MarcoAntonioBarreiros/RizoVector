name: Rebalance enemy drift

on:
  push:
    branches: [master]
    paths:
      - '.github/workflows/rebalance-enemy-drift.yml'

permissions:
  contents: write

jobs:
  rebalance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reduce camera-dominated descent
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('src/systems/EnemySystem.js')
          text = path.read_text()
          replacements = [
              ("const base=g.scrollSpeed+e.speed;", "const base=g.scrollSpeed*.32+e.speed*.28;"),
              ("if(!pts.length){e.y+=(g.scrollSpeed+e.speed)*dt;return}", "if(!pts.length){e.y+=(g.scrollSpeed*.34+e.speed*.35)*dt;return}"),
              ("e.y+=(g.scrollSpeed+e.speed*.6)*dt", "e.y+=(g.scrollSpeed*.30+e.speed*.32)*dt"),
          ]
          for old, new in replacements:
              if text.count(old) != 1:
                  raise SystemExit(f'Expected one match for: {old}')
              text = text.replace(old, new)
          path.write_text(text)
          PY

      - name: Validate JavaScript
        run: node --check src/systems/EnemySystem.js

      - name: Commit rebalance
        run: |
          rm .github/workflows/rebalance-enemy-drift.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Let organism motion dominate over camera drift"
          git push origin HEAD:master
