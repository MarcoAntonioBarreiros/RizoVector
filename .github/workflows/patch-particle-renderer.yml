name: Install particle renderer
on:
  push:
    branches: [master]
    paths: ['.github/workflows/patch-particle-renderer.yml']
permissions:
  contents: write
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch particle renderer
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path=Path('src/rendering/Renderer.js')
          text=path.read_text()
          old=""" particle(c,p){c.save();const lr=clamp(p.life/p.maxLife,0,1);c.globalAlpha=lr*(p.alpha??1);if(p.blend==='add')c.globalCompositeOperation='lighter';
   if(p.kind==='tracer'){c.strokeStyle=p.color;c.lineWidth=1.6;c.beginPath();c.moveTo(p.x,p.y);c.lineTo(p.tx,p.ty);c.stroke()}
   else if(p.kind==='walker'){const prog=1-p.life/p.maxLife,x1=p.x+(p.tx-p.x)*Math.max(0,prog-.25),y1=p.y+(p.ty-p.y)*Math.max(0,prog-.25),x2=p.x+(p.tx-p.x)*prog,y2=p.y+(p.ty-p.y)*prog;c.strokeStyle=p.color;c.fillStyle=p.color;c.lineWidth=p.radius||2;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.beginPath();c.arc(x2,y2,(p.radius||2)+.8,0,TAU);c.fill()}
   else if(p.kind==='ring'){c.globalAlpha=lr*lr*(p.alpha??1);c.strokeStyle=p.color;c.lineWidth=3;c.beginPath();c.arc(p.x,p.y,p.radius,0,TAU);c.stroke()}
   else if(p.kind==='text'){c.globalCompositeOperation='source-over';c.fillStyle=p.color;c.font='800 16px Inter,system-ui';c.textAlign='center';c.fillText(p.text,p.x,p.y)}
   else{const spr=this.spriteFor(p.color);let r=p.radius||2;if(p.kind==='smoke')r=(p.radius||2)*(1+(1-lr)*2.4);const d=r*(p.kind==='smoke'?4.5:3.2);c.drawImage(spr,p.x-d/2,p.y-d/2,d,d)}
   c.restore()}"""
          new=""" particle(c,p){c.save();const lr=clamp(p.life/p.maxLife,0,1),birth=clamp((1-lr)/(p.birthFade??.08),0,1),fade=Math.pow(lr,p.fadePower??1.45);c.globalAlpha=fade*birth*(p.alpha??1);if(p.blend==='add')c.globalCompositeOperation='lighter';
   if(p.kind==='tracer'){c.strokeStyle=p.color;c.lineWidth=1.6;c.beginPath();c.moveTo(p.x,p.y);c.lineTo(p.tx,p.ty);c.stroke()}
   else if(p.kind==='walker'){const prog=1-p.life/p.maxLife,x1=p.x+(p.tx-p.x)*Math.max(0,prog-.25),y1=p.y+(p.ty-p.y)*Math.max(0,prog-.25),x2=p.x+(p.tx-p.x)*prog,y2=p.y+(p.ty-p.y)*prog;c.strokeStyle=p.color;c.fillStyle=p.color;c.lineWidth=p.radius||2;c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke();c.beginPath();c.arc(x2,y2,(p.radius||2)+.8,0,TAU);c.fill()}
   else if(p.kind==='ring'){c.globalAlpha=fade*fade*(p.alpha??1);c.strokeStyle=p.color;c.lineWidth=3;c.beginPath();c.arc(p.x,p.y,p.radius,0,TAU);c.stroke()}
   else if(p.kind==='text'){c.globalCompositeOperation='source-over';c.fillStyle=p.color;c.font='800 16px Inter,system-ui';c.textAlign='center';c.fillText(p.text,p.x,p.y)}
   else{const shape=p.shape||(p.kind==='smoke'?'cloud':'orb'),r=p.radius||2,vx=p.vx||0,vy=p.vy||0,speed=Math.hypot(vx,vy),dir=speed>1?Math.atan2(vy,vx):(p.spin||0),len=(p.length||r*5)*(0.45+lr*.55),w=p.width||Math.max(.8,r*.65);c.translate(p.x,p.y);
    if(shape==='orb'||shape==='cloud'){const spr=this.spriteFor(p.color),rr=shape==='cloud'?r*(1+(1-lr)*2.4):r,d=rr*(shape==='cloud'?4.5:3.4);c.drawImage(spr,-d/2,-d/2,d,d)}
    else if(shape==='streak'){c.rotate(dir);c.lineCap='round';c.strokeStyle=this._rgba(p.color,.32);c.lineWidth=w*3;c.beginPath();c.moveTo(-len,0);c.lineTo(2,0);c.stroke();c.strokeStyle='rgba(255,255,255,.78)';c.lineWidth=Math.max(.7,w*.72);c.beginPath();c.moveTo(-len*.7,0);c.lineTo(2,0);c.stroke()}
    else if(shape==='shard'){c.rotate((p.spin||0)+dir*.25);c.fillStyle=p.color;c.strokeStyle='rgba(255,255,255,.72)';c.lineWidth=.8;c.beginPath();c.moveTo(len*.42,0);c.lineTo(-len*.3,w*1.8);c.lineTo(-len*.16,-w*1.45);c.closePath();c.fill();c.stroke()}
    else if(shape==='ribbon'){c.rotate(dir);const bend=(p.curve||0)*len;c.lineCap='round';c.strokeStyle=this._rgba(p.color,.28);c.lineWidth=w*3.2;c.beginPath();c.moveTo(-len,0);c.quadraticCurveTo(-len*.45,bend,2,0);c.stroke();c.strokeStyle='rgba(255,255,255,.66)';c.lineWidth=Math.max(.7,w*.65);c.beginPath();c.moveTo(-len*.82,0);c.quadraticCurveTo(-len*.4,bend*.75,2,0);c.stroke()}
    else if(shape==='arc'){c.rotate((p.spin||0)+dir);const rr=Math.max(4,len*.42),span=1.15+Math.abs(p.curve||0);c.strokeStyle=this._rgba(p.color,.38);c.lineWidth=w*2.2;c.beginPath();c.arc(0,0,rr,-span*.5,span*.5);c.stroke();c.strokeStyle='rgba(255,255,255,.62)';c.lineWidth=Math.max(.6,w*.55);c.beginPath();c.arc(0,0,rr,-span*.34,span*.5);c.stroke()}
    else if(shape==='spiral'){c.rotate(p.spin||0);c.lineCap='round';c.strokeStyle=this._rgba(p.color,.48);c.lineWidth=w*1.8;c.beginPath();for(let i=0;i<=12;i++){const u=i/12,a=u*TAU*1.7,rr=u*len*.48,x=Math.cos(a)*rr,y=Math.sin(a)*rr;i?c.lineTo(x,y):c.moveTo(x,y)}c.stroke();c.strokeStyle='rgba(255,255,255,.58)';c.lineWidth=Math.max(.55,w*.5);c.beginPath();for(let i=4;i<=12;i++){const u=i/12,a=u*TAU*1.7,rr=u*len*.48,x=Math.cos(a)*rr,y=Math.sin(a)*rr;i===4?c.moveTo(x,y):c.lineTo(x,y)}c.stroke()}
   }
   c.restore()}"""
          if old not in text: raise SystemExit('particle renderer block not found')
          path.write_text(text.replace(old,new))
          Path('.github/workflows/patch-particle-renderer.yml').unlink()
          PY
      - name: Validate JavaScript
        run: |
          node --check src/effects/ParticleLibrary.js
          node --check src/systems/EffectsSystem.js
          node --check src/rendering/Renderer.js
          node --check src/core/ObjectPool.js
      - name: Commit renderer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Render varied glowing particle shapes"
          git push
